services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: webapp
    restart: always
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: "mongodb://mongo:27017/webapp"
      PORT: 3000
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
